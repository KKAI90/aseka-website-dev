name: CI → Lint & Type Check

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

# Deployments are handled automatically by Vercel GitHub Integration:
#   dev  branch → https://aseka-website-dev-git-dev-asekathao-8590s-projects.vercel.app
#   main branch → https://aseka.co.jp (production)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint
